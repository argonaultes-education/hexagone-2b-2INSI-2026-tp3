syntax = "proto3";

service SubscribeService {
    rpc Subscribe(ClientSubscriber) returns (SubscribeResponse) {}

    rpc Notify(EventNotification) returns (NotifyResponse) {}
}

message ClientSubscriber {
    string ip = 1;
    int32 port = 2;
}

message SubscribeResponse {
    int32 id = 1;
    string ip = 2;
    int32 port = 3;
}

message EventNotification {
    string event = 1;
}

message NotifyResponse {
    string status = 1;
}